# #######################################################################################
# PRO RICE CONFIG - READY FOR R/UNIXPORN
# #######################################################################################

################
### MONITORS ###
################

monitor=,preferred,auto,1

###################
### MY PROGRAMS ###
###################

$terminal = cool-retro-term
$fileManager = nemo
$menu = rofi -show drun -show-icons

#################
### AUTOSTART ###
#################

# 1. Сначала железно импортируем переменные окружения в D-Bus и Systemd
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=Hyprland
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# 2. Перезапускаем сам портал, чтобы он гарантированно увидел переменные из шага 1
exec-once = systemctl --user restart xdg-desktop-portal-hyprland
exec-once = systemctl --user restart xdg-desktop-portal

# 3. И только теперь запускаем твой сочный софт (без каши из амперсандов)
exec-once = waybar
exec-once = hyprpaper
exec-once = mako

# Автозапуск автоматического переключения шейдеров при старте

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# NVIDIA фиксы (у тебя RTX 5060 Ti, это мастхэв для плавности)
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 6
    gaps_out = 14

    border_size = 4

    # Сочный неоновый градиент (Catppuccin Mauve & Light Blue)
    col.active_border = rgb(f7768e) 45deg
    col.inactive_border = rgba(11111b00) # Полностью прозрачная неактивная рамка

    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 12

    active_opacity = 0.92
    inactive_opacity = 0.85

    # Элегантные тени для объема
    shadow {
        enabled = true
        range = 20
        render_power = 4
        color = rgba(00000055)
    }

    # Матовое стекло (High quality blur)
    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = true
        vibrancy = 0.2
        brightness = 1.0
    }
}

##################
### ANIMATIONS ###
##################

animations {
    enabled = true

    # Кастомные плавные кривые Безье
    bezier = winIn, 0.1, 1.1, 0.1, 1.05
    bezier = winOut, 0.3, -0.3, 0.5, 1
    bezier = slow, 0.1, 1, 0.1, 1
    bezier = bounce, 0.175, 0.885, 0.32, 1.275

    animation = windows, 1, 5, bounce, popin 85%
    animation = windowsIn, 1, 4, winIn, popin 85%
    animation = windowsOut, 1, 4, winOut, popin 80%
    animation = fade, 1, 5, slow
    animation = workspaces, 1, 5, bounce, slide
    animation = layers, 1, 4, bounce, fade
}

######################
### SMART GAPS #######
######################

# Без отступов и рамок, если на воркспейсе всего одно окно (новый синтаксис)
workspace = w[tv1], gapsout:0, gapsin:0
workspace = f[1], gapsout:0, gapsin:0


#############
### INPUT ###
#############

input {
    kb_layout = us,ru
    kb_options = grp:win_space_toggle
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = false
    }
}

###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, P, exec, hyprpicker -a

# Навигация (Vim-style стрелочки + дефолтные)
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d
# SUPER + SHIFT + S -> Скриншот выделенной области в ~/Pictures и буфер
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | tee ~/Pictures/Screen_$(date +'%Y%m%d_%H%M%S').png | wl-copy
# Воркспейсы
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Перенос окон
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Скретчпад
bind = $mainMod, S, togglespecialworkspace, magic

# Скролл воркспейсов мышкой
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Драг окон
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow


# Мультимедиа
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
